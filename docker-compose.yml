version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/venv # Don't overwrite container venv with host venv if mounted

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
